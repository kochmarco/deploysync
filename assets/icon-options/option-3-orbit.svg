<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#08080f"/>
      <stop offset="100%" style="stop-color:#101020"/>
    </linearGradient>
    <linearGradient id="core3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6ecb63"/>
      <stop offset="100%" style="stop-color:#4aaf40"/>
    </linearGradient>
    <radialGradient id="coreGlow3" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#6ecb63;stop-opacity:0.4"/>
      <stop offset="100%" style="stop-color:#6ecb63;stop-opacity:0"/>
    </radialGradient>
    <filter id="glow3">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <filter id="glow3big">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="108" fill="url(#bg3)"/>
  <!-- Core glow -->
  <circle cx="256" cy="256" r="100" fill="url(#coreGlow3)"/>
  <!-- Orbit ring 1 - tilted -->
  <g filter="url(#glow3)" transform="rotate(-25, 256, 256)">
    <ellipse cx="256" cy="256" rx="170" ry="70" fill="none" stroke="#7ec8e3" stroke-width="2.5" opacity="0.5"/>
    <!-- Orbiting file -->
    <g transform="translate(420, 230)">
      <rect x="-12" y="-15" width="24" height="30" rx="3" fill="#7ec8e3" opacity="0.9"/>
      <line x1="-6" y1="-4" x2="6" y2="-4" stroke="#0a0a1a" stroke-width="2"/>
      <line x1="-6" y1="2" x2="4" y2="2" stroke="#0a0a1a" stroke-width="2"/>
      <line x1="-6" y1="8" x2="2" y2="8" stroke="#0a0a1a" stroke-width="2"/>
    </g>
  </g>
  <!-- Orbit ring 2 - opposite tilt -->
  <g filter="url(#glow3)" transform="rotate(35, 256, 256)">
    <ellipse cx="256" cy="256" rx="155" ry="60" fill="none" stroke="#d4a574" stroke-width="2" opacity="0.4"/>
    <!-- Orbiting file -->
    <g transform="translate(105, 275)">
      <rect x="-10" y="-13" width="20" height="26" rx="3" fill="#d4a574" opacity="0.8"/>
      <line x1="-5" y1="-3" x2="5" y2="-3" stroke="#0a0a1a" stroke-width="1.5"/>
      <line x1="-5" y1="3" x2="3" y2="3" stroke="#0a0a1a" stroke-width="1.5"/>
    </g>
  </g>
  <!-- Orbit ring 3 -->
  <g filter="url(#glow3)" transform="rotate(-70, 256, 256)">
    <ellipse cx="256" cy="256" rx="140" ry="50" fill="none" stroke="#6ecb63" stroke-width="1.5" opacity="0.3"/>
  </g>
  <!-- Central core - the "server" -->
  <g filter="url(#glow3big)">
    <circle cx="256" cy="256" r="38" fill="url(#core3)" opacity="0.9"/>
  </g>
  <circle cx="256" cy="256" r="38" fill="url(#core3)"/>
  <!-- Upload arrow inside core -->
  <g>
    <line x1="256" y1="272" x2="256" y2="242" stroke="#0a0a1a" stroke-width="5" stroke-linecap="round"/>
    <path d="M244 252 L256 238 L268 252" stroke="#0a0a1a" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  </g>
  <!-- Subtle grid dots -->
  <g opacity="0.15">
    <circle cx="130" cy="130" r="2" fill="#7ec8e3"/>
    <circle cx="130" cy="380" r="2" fill="#7ec8e3"/>
    <circle cx="380" cy="130" r="2" fill="#7ec8e3"/>
    <circle cx="380" cy="380" r="2" fill="#7ec8e3"/>
  </g>
</svg>