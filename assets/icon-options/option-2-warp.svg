<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#080812"/>
      <stop offset="100%" style="stop-color:#0e0e20"/>
    </linearGradient>
    <linearGradient id="bolt2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#6ecb63"/>
      <stop offset="100%" style="stop-color:#3a9e30"/>
    </linearGradient>
    <linearGradient id="trail2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#7ec8e3"/>
      <stop offset="100%" style="stop-color:#4a90a8"/>
    </linearGradient>
    <filter id="glow2">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <filter id="glow2big">
      <feGaussianBlur stdDeviation="16" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="108" fill="url(#bg2)"/>
  <!-- Speed trails -->
  <g opacity="0.3" filter="url(#glow2)">
    <line x1="120" y1="140" x2="120" y2="260" stroke="#7ec8e3" stroke-width="2" stroke-linecap="round"/>
    <line x1="160" y1="100" x2="160" y2="300" stroke="#6ecb63" stroke-width="2" stroke-linecap="round"/>
    <line x1="340" y1="120" x2="340" y2="310" stroke="#7ec8e3" stroke-width="2" stroke-linecap="round"/>
    <line x1="380" y1="150" x2="380" y2="280" stroke="#d4a574" stroke-width="2" stroke-linecap="round"/>
    <line x1="140" y1="160" x2="140" y2="240" stroke="#d4a574" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="360" y1="130" x2="360" y2="260" stroke="#6ecb63" stroke-width="1.5" stroke-linecap="round"/>
  </g>
  <!-- Central hexagon outline -->
  <g filter="url(#glow2)">
    <polygon points="256,100 370,168 370,304 256,372 142,304 142,168" fill="none" stroke="#7ec8e3" stroke-width="3" opacity="0.25"/>
    <polygon points="256,130 348,186 348,290 256,348 164,290 164,186" fill="none" stroke="#7ec8e3" stroke-width="2" opacity="0.12"/>
  </g>
  <!-- Lightning bolt / deploy symbol -->
  <g filter="url(#glow2big)">
    <path d="M280 130 L220 260 L270 260 L230 390" stroke="url(#bolt2)" stroke-width="16" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  </g>
  <!-- Bolt fill for solidity -->
  <path d="M280 130 L220 260 L270 260 L230 390" stroke="url(#bolt2)" stroke-width="10" stroke-linecap="round" stroke-linejoin="round" fill="none" opacity="0.9"/>
  <!-- Inner glow at bolt center -->
  <circle cx="250" cy="260" r="30" fill="#6ecb63" opacity="0.08"/>
  <!-- Small dots / data particles -->
  <g filter="url(#glow2)">
    <circle cx="190" cy="200" r="4" fill="#6ecb63" opacity="0.7"/>
    <circle cx="320" cy="220" r="3" fill="#7ec8e3" opacity="0.6"/>
    <circle cx="200" cy="320" r="3" fill="#d4a574" opacity="0.5"/>
    <circle cx="310" cy="310" r="4" fill="#6ecb63" opacity="0.4"/>
    <circle cx="180" cy="270" r="2" fill="#7ec8e3" opacity="0.5"/>
    <circle cx="330" cy="170" r="3" fill="#d4a574" opacity="0.4"/>
  </g>
</svg>