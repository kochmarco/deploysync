<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#06060e"/>
      <stop offset="100%" style="stop-color:#0c0c1e"/>
    </linearGradient>
    <linearGradient id="tri4" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" style="stop-color:#7ec8e3"/>
      <stop offset="50%" style="stop-color:#6ecb63"/>
      <stop offset="100%" style="stop-color:#3a9e30"/>
    </linearGradient>
    <linearGradient id="inner4" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" style="stop-color:#d4a574"/>
      <stop offset="100%" style="stop-color:#c4885a"/>
    </linearGradient>
    <filter id="glow4">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <filter id="glow4big">
      <feGaussianBlur stdDeviation="20" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <clipPath id="roundedRect4">
      <rect width="512" height="512" rx="108"/>
    </clipPath>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="108" fill="url(#bg4)"/>
  <!-- Background ambient glow -->
  <g clip-path="url(#roundedRect4)">
    <circle cx="256" cy="300" r="200" fill="#6ecb63" opacity="0.03"/>
  </g>
  <!-- Outer triangle glow -->
  <g filter="url(#glow4big)">
    <polygon points="256,72 432,380 80,380" fill="none" stroke="url(#tri4)" stroke-width="3" opacity="0.3"/>
  </g>
  <!-- Main triangle -->
  <g filter="url(#glow4)">
    <polygon points="256,95 415,368 97,368" fill="none" stroke="url(#tri4)" stroke-width="6" opacity="0.9"/>
  </g>
  <!-- Inner smaller triangle (inverted) -->
  <g filter="url(#glow4)">
    <polygon points="256,330 185,200 327,200" fill="none" stroke="url(#inner4)" stroke-width="3.5" opacity="0.7"/>
  </g>
  <!-- Central "D" letter stylized -->
  <g filter="url(#glow4)">
    <text x="256" y="290" text-anchor="middle" font-family="SF Pro Display, -apple-system, Helvetica Neue, Arial" font-weight="800" font-size="100" fill="url(#tri4)" opacity="0.85">D</text>
  </g>
  <!-- Connection lines from triangle vertices -->
  <g opacity="0.2" stroke="#7ec8e3" stroke-width="1">
    <line x1="256" y1="95" x2="256" y2="200" stroke-dasharray="4 4"/>
    <line x1="97" y1="368" x2="185" y2="200" stroke-dasharray="4 4"/>
    <line x1="415" y1="368" x2="327" y2="200" stroke-dasharray="4 4"/>
  </g>
  <!-- Vertex dots -->
  <g filter="url(#glow4)">
    <circle cx="256" cy="95" r="5" fill="#7ec8e3" opacity="0.8"/>
    <circle cx="415" cy="368" r="5" fill="#6ecb63" opacity="0.8"/>
    <circle cx="97" cy="368" r="5" fill="#6ecb63" opacity="0.8"/>
  </g>
  <!-- Inner triangle vertex dots -->
  <circle cx="256" cy="330" r="3" fill="#d4a574" opacity="0.6"/>
  <circle cx="185" cy="200" r="3" fill="#d4a574" opacity="0.6"/>
  <circle cx="327" cy="200" r="3" fill="#d4a574" opacity="0.6"/>
</svg>