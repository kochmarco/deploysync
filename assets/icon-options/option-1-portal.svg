<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a1a"/>
      <stop offset="100%" style="stop-color:#12122a"/>
    </linearGradient>
    <linearGradient id="ring1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6ecb63"/>
      <stop offset="50%" style="stop-color:#7ec8e3"/>
      <stop offset="100%" style="stop-color:#d4a574"/>
    </linearGradient>
    <linearGradient id="arrow1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#7ec8e3"/>
      <stop offset="100%" style="stop-color:#6ecb63"/>
    </linearGradient>
    <filter id="glow1">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="108" fill="url(#bg1)"/>
  <!-- Outer glow ring -->
  <ellipse cx="256" cy="260" rx="155" ry="175" fill="none" stroke="url(#ring1)" stroke-width="4" opacity="0.3" filter="url(#glow1)"/>
  <!-- Portal ring - tilted ellipse -->
  <ellipse cx="256" cy="260" rx="130" ry="160" fill="none" stroke="url(#ring1)" stroke-width="8" opacity="0.9" filter="url(#glow1)"/>
  <!-- Inner portal glow -->
  <ellipse cx="256" cy="260" rx="100" ry="130" fill="#6ecb63" opacity="0.05"/>
  <ellipse cx="256" cy="260" rx="60" ry="80" fill="#7ec8e3" opacity="0.08"/>
  <!-- Arrow going through portal -->
  <g filter="url(#glow1)">
    <path d="M256 380 L256 140" stroke="url(#arrow1)" stroke-width="12" stroke-linecap="round"/>
    <path d="M210 190 L256 130 L302 190" stroke="url(#arrow1)" stroke-width="12" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  </g>
  <!-- Small file icon at arrow base -->
  <g opacity="0.7">
    <rect x="238" y="370" width="36" height="44" rx="4" fill="none" stroke="#d4a574" stroke-width="3"/>
    <path d="M260 370 L260 380 L274 380" stroke="#d4a574" stroke-width="2" fill="none"/>
    <line x1="246" y1="388" x2="266" y2="388" stroke="#d4a574" stroke-width="2" opacity="0.5"/>
    <line x1="246" y1="396" x2="262" y2="396" stroke="#d4a574" stroke-width="2" opacity="0.5"/>
    <line x1="246" y1="404" x2="258" y2="404" stroke="#d4a574" stroke-width="2" opacity="0.5"/>
  </g>
  <!-- Particles -->
  <circle cx="200" cy="180" r="3" fill="#6ecb63" opacity="0.6"/>
  <circle cx="310" cy="200" r="2" fill="#7ec8e3" opacity="0.5"/>
  <circle cx="220" cy="150" r="2" fill="#d4a574" opacity="0.4"/>
  <circle cx="300" cy="160" r="3" fill="#7ec8e3" opacity="0.3"/>
  <circle cx="190" cy="220" r="2" fill="#6ecb63" opacity="0.4"/>
</svg>