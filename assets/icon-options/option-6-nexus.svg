<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg6" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#06060d"/>
      <stop offset="100%" style="stop-color:#0a0a1a"/>
    </linearGradient>
    <linearGradient id="grad6a" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6ecb63"/>
      <stop offset="100%" style="stop-color:#7ec8e3"/>
    </linearGradient>
    <linearGradient id="grad6b" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7ec8e3"/>
      <stop offset="100%" style="stop-color:#d4a574"/>
    </linearGradient>
    <radialGradient id="center6" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#6ecb63;stop-opacity:0.6"/>
      <stop offset="60%" style="stop-color:#6ecb63;stop-opacity:0.1"/>
      <stop offset="100%" style="stop-color:#6ecb63;stop-opacity:0"/>
    </radialGradient>
    <filter id="glow6">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <filter id="glow6big">
      <feGaussianBlur stdDeviation="15" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="108" fill="url(#bg6)"/>
  <!-- Central glow -->
  <circle cx="256" cy="256" r="120" fill="url(#center6)"/>
  <!-- Outer rotating square 1 -->
  <g filter="url(#glow6)" transform="rotate(45, 256, 256)">
    <rect x="116" y="116" width="280" height="280" rx="20" fill="none" stroke="url(#grad6a)" stroke-width="3" opacity="0.35"/>
  </g>
  <!-- Outer rotating square 2 -->
  <g filter="url(#glow6)" transform="rotate(22.5, 256, 256)">
    <rect x="136" y="136" width="240" height="240" rx="16" fill="none" stroke="url(#grad6b)" stroke-width="2" opacity="0.2"/>
  </g>
  <!-- Inner circle -->
  <g filter="url(#glow6big)">
    <circle cx="256" cy="256" r="70" fill="none" stroke="#6ecb63" stroke-width="4" opacity="0.6"/>
  </g>
  <!-- Stylized "DS" monogram -->
  <g filter="url(#glow6)">
    <!-- D -->
    <path d="M218 218 L218 294 Q218 310 234 310 L250 310 Q275 310 275 285 L275 243 Q275 218 250 218 Z"
      fill="none" stroke="#6ecb63" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- S -->
    <path d="M295 224 Q295 218 280 218 Q268 218 268 230 Q268 242 282 246 Q298 250 298 265 Q298 280 282 280 Q268 280 268 272"
      fill="none" stroke="#7ec8e3" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  <!-- Connection nodes -->
  <g filter="url(#glow6)">
    <!-- Top -->
    <circle cx="256" cy="116" r="8" fill="#7ec8e3" opacity="0.7"/>
    <line x1="256" y1="124" x2="256" y2="186" stroke="#7ec8e3" stroke-width="1.5" opacity="0.3" stroke-dasharray="4 3"/>
    <!-- Bottom -->
    <circle cx="256" cy="396" r="8" fill="#6ecb63" opacity="0.7"/>
    <line x1="256" y1="388" x2="256" y2="326" stroke="#6ecb63" stroke-width="1.5" opacity="0.3" stroke-dasharray="4 3"/>
    <!-- Left -->
    <circle cx="116" cy="256" r="6" fill="#d4a574" opacity="0.6"/>
    <line x1="122" y1="256" x2="186" y2="256" stroke="#d4a574" stroke-width="1.5" opacity="0.3" stroke-dasharray="4 3"/>
    <!-- Right -->
    <circle cx="396" cy="256" r="6" fill="#d4a574" opacity="0.6"/>
    <line x1="390" y1="256" x2="326" y2="256" stroke="#d4a574" stroke-width="1.5" opacity="0.3" stroke-dasharray="4 3"/>
  </g>
  <!-- Corner accents -->
  <g opacity="0.15">
    <circle cx="155" cy="155" r="3" fill="#6ecb63"/>
    <circle cx="357" cy="155" r="3" fill="#7ec8e3"/>
    <circle cx="155" cy="357" r="3" fill="#7ec8e3"/>
    <circle cx="357" cy="357" r="3" fill="#d4a574"/>
  </g>
</svg>